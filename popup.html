<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ColorKit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;color:#c9d1d9;background:#0d1117;width:360px;padding:16px}
h1{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.picker-row{display:flex;gap:12px;margin-bottom:16px;align-items:center}
.color-input{width:60px;height:60px;border-radius:12px;border:2px solid #30363d;cursor:pointer;flex-shrink:0;padding:0;background:transparent}
.color-input::-webkit-color-swatch-wrapper{padding:0}
.color-input::-webkit-color-swatch{border:none;border-radius:10px}
.color-values{flex:1}
.color-hex{font-size:20px;font-weight:700;color:#f0f6fc;letter-spacing:1px;margin-bottom:4px}
.color-rgb{font-size:12px;color:#8b949e}
.color-actions{display:flex;gap:4px;margin-top:6px}
.copy-btn{padding:2px 8px;font-size:10px;border:1px solid #30363d;border-radius:4px;background:#21262d;color:#c9d1d9;cursor:pointer}
.copy-btn:hover{background:#30363d}
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;border:1px solid #30363d;border-radius:6px;background:#161b22;color:#c9d1d9;cursor:pointer;transition:all 0.1s}
.tab.active{border-color:#58a6ff;background:#1a2230}
.harmony-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.swatch{text-align:center;cursor:pointer}
.swatch-color{width:100%;aspect-ratio:1;border-radius:8px;border:1px solid #30363d;margin-bottom:4px;transition:transform 0.1s}
.swatch-color:hover{transform:scale(1.1)}
.swatch-label{font-size:9px;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.palette-item{padding:10px 12px;margin-bottom:6px;background:#161b22;border:1px solid #30363d;border-radius:8px}
.palette-name{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between}
.palette-colors{display:flex;gap:4px}
.palette-dot{flex:1;height:28px;border-radius:4px;cursor:pointer;transition:transform 0.1s}
.palette-dot:hover{transform:scaleY(1.2)}
.history-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.hist-dot{width:28px;height:28px;border-radius:6px;cursor:pointer;border:1px solid #30363d;transition:transform 0.1s}
.hist-dot:hover{transform:scale(1.2)}
.btn-row{display:flex;gap:6px;margin-bottom:8px}
.btn{flex:1;padding:8px;font-size:12px;font-weight:600;text-align:center;border:1px solid #30363d;border-radius:6px;background:#21262d;color:#c9d1d9;cursor:pointer}
.btn:hover{background:#30363d}
.btn-primary{background:#238636;border-color:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.empty{padding:20px 0;text-align:center;color:#484f58;font-size:12px}
.footer{margin-top:8px;padding-top:8px;border-top:1px solid #21262d;display:flex;justify-content:space-between}
.footer a{color:#8b949e;text-decoration:none;font-size:11px}
</style>
</head>
<body>
<h1>🎨 ColorKit</h1>

<div class="picker-row">
  <input type="color" class="color-input" id="color-picker" value="#58a6ff">
  <div class="color-values">
    <div class="color-hex" id="hex-val">#58A6FF</div>
    <div class="color-rgb" id="rgb-val">RGB(88, 166, 255)</div>
    <div class="color-actions">
      <button class="copy-btn" data-copy="hex">复制HEX</button>
      <button class="copy-btn" data-copy="rgb">复制RGB</button>
      <button class="copy-btn" data-copy="hsl">复制HSL</button>
    </div>
  </div>
</div>

<button class="btn btn-primary" id="btn-save" style="margin-bottom:12px">📌 保存到历史</button>

<div class="tabs">
  <button class="tab active" data-tab="harmony">🌈 色彩搭配</button>
  <button class="tab" data-tab="palettes">💾 调色板</button>
  <button class="tab" data-tab="history">🕐 历史</button>
</div>

<div id="tab-harmony">
  <div class="harmony-grid" id="harmony-grid"></div>
</div>
<div id="tab-palettes" style="display:none">
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-save-palette">💾 保存当前搭配</button>
  </div>
  <div id="palette-list"></div>
</div>
<div id="tab-history" style="display:none">
  <div class="history-row" id="history-row"></div>
</div>

<div class="footer">
  <a href="#" id="btn-settings">⚙️</a>
  <span style="font-size:10px;color:#8b949e">Ctrl+Shift+C</span>
</div>

<script src="popup.js"></script>
</body>
</html>
